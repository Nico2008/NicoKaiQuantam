
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  #sim-container {
    background: #1a2332;
    border-radius: 12px;
    padding: 0;
    overflow: hidden;
    font-family: var(--font-sans);
    border: 1.5px solid #2a3a52;
  }
  #sim-header {
    background: #0d1926;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #2a3a52;
  }
  #sim-header span {
    color: #7ec8e3;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  #sim-header .dot { width:10px;height:10px;border-radius:50%;background:#7ec8e3;opacity:0.7; }
  #canvas-wrap { position: relative; }
  #p5canvas { display: block; }
  #controls-panel {
    background: #0d1926;
    border-top: 1px solid #2a3a52;
    padding: 14px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: center;
    justify-content: space-between;
  }
  .ctrl-group { display:flex;flex-direction:column;gap:6px; min-width:120px; }
  .ctrl-label { color:#7ec8e3;font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase; }
  .ctrl-row { display:flex;align-items:center;gap:8px; }
  .ctrl-value { color:#fff;font-size:13px;font-weight:500;min-width:38px;text-align:right; }
  input[type=range] {
    -webkit-appearance:none;appearance:none;
    width:110px;height:4px;
    background:#2a3a52;border-radius:2px;outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:#7ec8e3;cursor:pointer;border:2px solid #0d1926;
  }
  input[type=range]::-webkit-slider-runnable-track { height:4px;border-radius:2px; }
  .phet-btn {
    padding:8px 20px;border-radius:8px;border:none;cursor:pointer;
    font-size:13px;font-weight:600;letter-spacing:0.3px;
    transition:all 0.15s;
  }
  .btn-release { background:#e8622a;color:#fff; }
  .btn-release:hover { background:#ff7a3a; transform:scale(1.03); }
  .btn-release:active { transform:scale(0.97); }
  .btn-reset { background:#2a3a52;color:#7ec8e3;border:1px solid #3a5a72; }
  .btn-reset:hover { background:#3a5a72; }
  .energy-bar-wrap {
    display:flex;flex-direction:column;gap:5px;min-width:160px;
  }
  .ebar-row { display:flex;align-items:center;gap:8px; }
  .ebar-label { color:#aaa;font-size:11px;width:24px; }
  .ebar-outer { flex:1;height:8px;background:#1a2a3a;border-radius:4px;overflow:hidden; }
  .ebar-inner { height:100%;border-radius:4px;transition:width 0.05s; }
  .ebar-ke { background:#f7c948; }
  .ebar-pe { background:#4a9eff; }
  .ebar-total { background:#5fdd9d; }
  .ebar-val { color:#ccc;font-size:11px;width:38px;text-align:right; }
</style>

<div id="sim-container">
  <div id="sim-header">
    <div class="dot"></div>
    <span>Energy Conservation — Bouncing Ball</span>
  </div>
  <div id="canvas-wrap">
    <div id="p5canvas"></div>
  </div>
  <div id="controls-panel">
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="phet-btn btn-release" id="btnRelease">&#9654; Release</button>
      <button class="phet-btn btn-reset" id="btnReset">↺ Reset</button>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Gravity (m/s²)</div>
      <div class="ctrl-row">
        <input type="range" id="gravSlider" min="1" max="20" value="9.8" step="0.1">
        <span class="ctrl-value" id="gravVal">9.8</span>
      </div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Elasticity</div>
      <div class="ctrl-row">
        <input type="range" id="elastSlider" min="0" max="1" value="1" step="0.01">
        <span class="ctrl-value" id="elastVal">1.00</span>
      </div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Ball Mass (kg)</div>
      <div class="ctrl-row">
        <input type="range" id="massSlider" min="0.1" max="5" value="1" step="0.1">
        <span class="ctrl-value" id="massVal">1.0</span>
      </div>
    </div>
    <div class="energy-bar-wrap">
      <div class="ctrl-label">Energy (J)</div>
      <div class="ebar-row">
        <span class="ebar-label" style="color:#f7c948">KE</span>
        <div class="ebar-outer"><div class="ebar-inner ebar-ke" id="keBar" style="width:0%"></div></div>
        <span class="ebar-val" id="keVal">0</span>
      </div>
      <div class="ebar-row">
        <span class="ebar-label" style="color:#4a9eff">PE</span>
        <div class="ebar-outer"><div class="ebar-inner ebar-pe" id="peBar" style="width:100%"></div></div>
        <span class="ebar-val" id="peVal">0</span>
      </div>
      <div class="ebar-row">
        <span class="ebar-label" style="color:#5fdd9d">E</span>
        <div class="ebar-outer"><div class="ebar-inner ebar-total" id="totBar" style="width:100%"></div></div>
        <span class="ebar-val" id="totVal">0</span>
      </div>
    </div>
  </div>
</div>

<script>
new p5(function(p) {
  const W = 520, H = 340;
  const FLOOR_Y = H - 48;
  const SCALE = 40;
  let ball, released = false;
  let g = 9.8, elast = 1.0, mass = 1.0;
  let totalEnergy = 0, bounceFlash = 0;
  let trailPts = [];
  let startHeight;

  function resetBall() {
    const r = 18;
    ball = { x: W/2, y: 60, vx: 0, vy: 0, r };
    released = false;
    trailPts = [];
    bounceFlash = 0;
    startHeight = (FLOOR_Y - ball.y) / SCALE;
    totalEnergy = mass * g * startHeight;
  }

  p.setup = function() {
    let cnv = p.createCanvas(W, H);
    cnv.parent('p5canvas');
    resetBall();
    document.getElementById('btnRelease').onclick = () => { if(!released) released = true; };
    document.getElementById('btnReset').onclick = () => resetBall();
    document.getElementById('gravSlider').oninput = function() {
      g = parseFloat(this.value);
      document.getElementById('gravVal').textContent = parseFloat(g).toFixed(1);
      if (!released) { startHeight = (FLOOR_Y - ball.y)/SCALE; totalEnergy = mass*g*startHeight; }
    };
    document.getElementById('elastSlider').oninput = function() {
      elast = parseFloat(this.value);
      document.getElementById('elastVal').textContent = elast.toFixed(2);
    };
    document.getElementById('massSlider').oninput = function() {
      mass = parseFloat(this.value);
      document.getElementById('massVal').textContent = mass.toFixed(1);
      if (!released) { startHeight = (FLOOR_Y - ball.y)/SCALE; totalEnergy = mass*g*startHeight; }
    };
  };

  let lastT = null;
  p.draw = function() {
    p.background(26, 35, 50);

    drawGrid();
    drawFloor();
    drawHeightArrow();

    if (released) {
      let dt = Math.min(p.deltaTime / 1000, 0.033);
      ball.vy += g * SCALE * dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      if (ball.y + ball.r >= FLOOR_Y) {
        ball.y = FLOOR_Y - ball.r;
        ball.vy = -ball.vy * elast;
        ball.vx *= elast;
        bounceFlash = 12;
        if (elast < 1) {
          let speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) / SCALE;
          totalEnergy = 0.5*mass*speed*speed + mass*g*((FLOOR_Y - ball.y)/SCALE);
        }
      }
      if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -elast; }
      if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx *= -elast; }
    }

    trailPts.push({x: ball.x, y: ball.y});
    if (trailPts.length > 60) trailPts.shift();
    drawTrail();

    drawBall();
    if (bounceFlash > 0) { drawBounceFlash(); bounceFlash--; }
    updateEnergy();
  };

  function drawGrid() {
    p.stroke(40, 55, 75);
    p.strokeWeight(0.5);
    for (let x = 0; x < W; x += 40) { p.line(x, 0, x, FLOOR_Y); }
    for (let y = 0; y < FLOOR_Y; y += 40) { p.line(0, y, W, y); }
  }

  function drawFloor() {
    if (bounceFlash > 0) {
      let a = p.map(bounceFlash, 0, 12, 0, 180);
      p.fill(247, 201, 72, a);
      p.noStroke();
      p.rect(0, FLOOR_Y, W, H - FLOOR_Y);
    }
    p.stroke(74, 158, 255);
    p.strokeWeight(2);
    p.line(0, FLOOR_Y, W, FLOOR_Y);
    p.fill(74, 158, 255, 30);
    p.noStroke();
    p.rect(0, FLOOR_Y, W, H - FLOOR_Y);
    p.fill(74, 158, 255, 60);
    for (let x = 0; x < W; x += 20) {
      p.noStroke();
      p.triangle(x, FLOOR_Y, x+10, FLOOR_Y+10, x+20, FLOOR_Y);
    }
  }

  function drawHeightArrow() {
    let h = (FLOOR_Y - ball.y) / SCALE;
    if (h < 0.1) return;
    p.stroke(95, 221, 157, 150);
    p.strokeWeight(1.5);
    p.drawingContext.setLineDash([4, 4]);
    p.line(ball.x + ball.r + 10, ball.y, ball.x + ball.r + 10, FLOOR_Y);
    p.drawingContext.setLineDash([]);
    p.fill(95, 221, 157);
    p.noStroke();
    let ax = ball.x + ball.r + 10;
    p.triangle(ax-4, ball.y+8, ax+4, ball.y+8, ax, ball.y);
    p.triangle(ax-4, FLOOR_Y-8, ax+4, FLOOR_Y-8, ax, FLOOR_Y);
    p.fill(95, 221, 157);
    p.noStroke();
    p.textSize(11);
    p.textAlign(p.LEFT);
    p.text('h=' + h.toFixed(2)+'m', ax+7, (ball.y+FLOOR_Y)/2+4);
  }

  function drawTrail() {
    if (!released) return;
    for (let i = 1; i < trailPts.length; i++) {
      let alpha = p.map(i, 0, trailPts.length, 0, 60);
      p.stroke(126, 200, 227, alpha);
      p.strokeWeight(p.map(i, 0, trailPts.length, 0.5, 2));
      p.line(trailPts[i-1].x, trailPts[i-1].y, trailPts[i].x, trailPts[i].y);
    }
  }

  function drawBall() {
    let speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy)/SCALE;
    let glowA = released ? p.map(speed, 0, 10, 20, 80) : 20;
    p.noStroke();
    p.fill(247, 100, 40, glowA);
    p.circle(ball.x, ball.y, (ball.r+10)*2);
    p.fill(247, 100, 40, glowA/2);
    p.circle(ball.x, ball.y, (ball.r+18)*2);

    p.stroke(255, 140, 60);
    p.strokeWeight(2);
    p.fill(232, 98, 42);
    p.circle(ball.x, ball.y, ball.r*2);
    p.noStroke();
    p.fill(255, 180, 100, 180);
    p.circle(ball.x - ball.r*0.3, ball.y - ball.r*0.3, ball.r*0.6);

    if (released && speed > 0.5) {
      p.stroke(247, 201, 72, 180);
      p.strokeWeight(1.5);
      let nx = ball.vx / (speed*SCALE+0.001);
      let ny = ball.vy / (speed*SCALE+0.001);
      let len = p.map(speed, 0, 12, 0, 35);
      p.line(ball.x, ball.y, ball.x + nx*len, ball.y + ny*len);
    }
  }

  function drawBounceFlash() {
    let a = p.map(bounceFlash, 0, 12, 0, 100);
    p.noStroke();
    p.fill(247, 201, 72, a);
    p.circle(ball.x, FLOOR_Y, bounceFlash * 6);
  }

  function updateEnergy() {
    let heightM = (FLOOR_Y - ball.y) / SCALE;
    let speedM = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) / SCALE;
    let pe = mass * g * Math.max(0, heightM);
    let ke = 0.5 * mass * speedM * speedM;
    if (!released) { pe = totalEnergy; ke = 0; }
    let tot = ke + pe;
    if (released && elast >= 1) tot = totalEnergy;
    let maxE = totalEnergy > 0 ? totalEnergy : 1;
    document.getElementById('keBar').style.width = Math.min(100, ke/maxE*100).toFixed(1)+'%';
    document.getElementById('peBar').style.width = Math.min(100, pe/maxE*100).toFixed(1)+'%';
    document.getElementById('totBar').style.width = Math.min(100, tot/maxE*100).toFixed(1)+'%';
    document.getElementById('keVal').textContent = ke.toFixed(1)+'J';
    document.getElementById('peVal').textContent = pe.toFixed(1)+'J';
    document.getElementById('totVal').textContent = tot.toFixed(1)+'J';
  }

  p.mousePressed = function() {
    if (!released && p.mouseX > 0 && p.mouseX < W && p.mouseY > 0 && p.mouseY < FLOOR_Y - ball.r) {
      ball.x = p.mouseX;
      ball.y = Math.max(ball.r, Math.min(p.mouseY, FLOOR_Y - ball.r));
      startHeight = (FLOOR_Y - ball.y) / SCALE;
      totalEnergy = mass * g * startHeight;
    }
  };

  p.mouseDragged = function() {
    if (!released && p.mouseX > 0 && p.mouseX < W && p.mouseY > 0 && p.mouseY < FLOOR_Y - ball.r) {
      ball.x = p.mouseX;
      ball.y = Math.max(ball.r, Math.min(p.mouseY, FLOOR_Y - ball.r));
      startHeight = (FLOOR_Y - ball.y) / SCALE;
      totalEnergy = mass * g * startHeight;
    }
  };

}, document.getElementById('p5canvas'));
</script>
